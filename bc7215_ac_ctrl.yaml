substitutions: !include local_paths.yaml

esphome:
  name: bc7215-ac-ctrl
  friendly_name: BC7215 AC CONTROLLER

esp32:
  variant: esp32c3
  framework:
    type: esp-idf
    components:
      - name: bc7215_ac_lib
        path: ${bc7215_project_dir}/deps/bc7215_ac_lib/examples/ESP-IDF/components/bc7215_ac_lib
      - name: bc7215
        path: ${bc7215_project_dir}/deps/bc7215_ac_lib/examples/ESP-IDF/components/bc7215
      - name: bc7215ac
        path: ${bc7215_project_dir}/deps/bc7215_ac_lib/examples/ESP-IDF/components/bc7215ac

external_components:
  - source:
      type: local
      path: components
    components: [bc7215_ac]

logger:

api:

ota:
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

climate:
  - platform: bc7215_ac
    id: ac_controller
    name: "AC"

    bc7215_uart_num: 1
    bc7215_tx_pin: GPIO3
    bc7215_rx_pin: GPIO4
    bc7215_busy_pin: GPIO1
    bc7215_mod_pin: GPIO0

    library_temperature_unit: C

    visual:
      min_temperature: 16
      max_temperature: 30
      temperature_step: 1

button:
  - platform: template
    name: "Pair Button"
    on_press:
      - lambda: |-
          id(ac_controller).start_pairing();

  - platform: template
    name: "Alt Button"
    on_press:
      - lambda: |-
          id(ac_controller).builtin_or_next();

text_sensor:
  - platform: template
    name: "Status"
    update_interval: 1s
    lambda: |-
      return {id(ac_controller).status_message()};
